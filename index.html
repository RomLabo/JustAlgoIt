<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <script src="https://kit.fontawesome.com/86dc8d5ed5.js" crossorigin="anonymous"></script>
        <title>Just Algo It</title>
    </head>
    <body>
        <header>
            <img class="logo" src="./assets/logo.png" alt="logo de l'application">
            <p id="offset"></p>
            <div>
                <button id="add" class="main-btn" title="ajouter module"><i class="fa-solid fa-plus"></i></button>
                <button id="eraser" class="main-btn" title="gomme"><i class="fa-solid fa-eraser"></i></button>
                <button id="undo" class="main-btn" title="précédent"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="redo" class="main-btn" title="suivant"><i class="fa-solid fa-arrow-right"></i></button>
                <a id="save-file" class="main-btn" title="télécharger" href="https://romlabo.github.io/JustAlgoIt/" download><i class="fa-solid fa-download"></i></a>
                <button id="open-file" class="main-btn" title="ouvrir fichier"><i class="fa-regular fa-folder-open"></i></button>
                <button id="new-file" class="main-btn" title="nouveau fichier"><i class="fa-solid fa-file-circle-plus"></i></button>
            </div>
        </header>
        <section>
            <canvas id="main-canvas"></canvas>
            <div id="vertical-line"></div>
            <div id="horizontal-line"></div>
            <div id="issue-form">
                <div>
                    <textarea name="" id="data" cols="20" rows="6" placeholder="Données"></textarea>
                    <textarea name="" id="issue" cols="20" rows="6" placeholder="Problème"></textarea>
                    <textarea name="" id="result" cols="20" rows="6" placeholder="Résultats"></textarea>
                </div>
                <button id="valid-issue" class="valid-btn">valider</button>
            </div>
            <canvas id="model-canvas"></canvas>
        </section>
        <input type="file" name="" id="to-open-file">
        <!-- Main Modules -->
        <script type="module" src="./js/main/File.js"></script>
        <script type="module" src="./js/main/Data.js"></script>
        <script type="module" src="./js/main/Eraser.js"></script>
        <script type="module" src="./js/main/Color.js"></script>
        <script type="module" src="./js/main/Landmark.js"></script>
        <!-- Tool Modules -->
        <script type="module" src="./js/models/Issue.js"></script>
        <script type="module" src="./js/App.js"></script>
    </body>
</html>
