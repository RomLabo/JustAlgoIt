<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <script src="https://kit.fontawesome.com/86dc8d5ed5.js" crossorigin="anonymous"></script>
        <title>Just Algo It</title>
    </head>
    <body>
        <header>
            <img class="logo" src="./assets/logo.png" alt="logo de l'application">
            <div>
                <button id="new-file"><i class="fa-solid fa-file-circle-plus"></i></button>
                <button id="open-file"><i class="fa-regular fa-folder-open"></i></button>
                <button id="save-file"><i class="fa-regular fa-floppy-disk"></i></button>
                <button id="undo"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="redo"><i class="fa-solid fa-arrow-right"></i></button>
                <button id="eraser"><i class="fa-solid fa-eraser"></i></button>
                <button id="prob"><i class="fa-solid fa-plus"></i></button>
                <!-- <button id="loop">O</button> -->
                <!-- <button id="params">P</button> -->
            </div>
        </header>
        <section>
            <canvas id="main-canvas"></canvas>
            <div id="issue-form">
                <div>
                    <textarea name="" id="data" cols="20" rows="6" placeholder="Données"></textarea>
                    <textarea name="" id="issue" cols="20" rows="6" placeholder="Problème"></textarea>
                    <textarea name="" id="result" cols="20" rows="6" placeholder="Résultats"></textarea>
                </div>
                <button id="valid-issue">valider</button>
            </div>
        </section>
        <input type="file" name="" id="to-open-file">
        <!-- Main Modules -->
        <script type="module" src="./js/main/File.js"></script>
        <!-- Tool Modules -->
        <script type="module" src="./js/tools/Eraser.js"></script>
        <script type="module" src="./js/tools/Issue.js"></script>
        <script type="module" src="./js/tools/Color.js"></script>
        <script type="module" src="./js/App.js"></script>
    </body>
</html>
